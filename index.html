<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Tracker</title>
  <style>
    :root {
      --bg: #eef2f6;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --success: #15803d;
      --success-bg: #ecfdf3;
      --danger: #b91c1c;
      --danger-bg: #fef2f2;
      --warn: #a16207;
      --warn-bg: #fffbeb;
      --info: #1d4ed8;
      --info-bg: #eff6ff;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1220px;
      margin: 0 auto;
      padding: 20px;
    }

    h1, h2, h3, h4, p { margin-top: 0; }

    .panel {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 18px;
    }

    .page-title {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 0;
      line-height: 1.5;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #4b5563;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      height: 46px;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
    }

    .field input:focus {
      outline: none;
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 12px;
      height: 46px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 800;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
    .btn-secondary { background: linear-gradient(135deg, #22c55e, #15803d); color: white; }
    .btn-muted { background: #6b7280; color: white; }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .btn-light { background: #e5e7eb; color: #374151; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-card {
      border-radius: 16px;
      padding: 18px;
      min-height: 122px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      border: 1px solid rgba(0,0,0,0.03);
    }

    .summary-card h3 {
      font-size: 14px;
      margin: 0;
      font-weight: 800;
      line-height: 1.3;
    }

    .summary-card .value {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.25;
      word-break: break-word;
    }

    .card-investment { background: #f8fafc; color: #1f2937; }
    .card-paid { background: var(--success-bg); color: var(--success); }
    .card-unpaid { background: var(--danger-bg); color: var(--danger); }
    .card-unsold { background: var(--warn-bg); color: var(--warn); }
    .card-expected { background: var(--info-bg); color: var(--info); }
    .card-sold { background: #f5f3ff; color: #6d28d9; }
    .card-profit { background: #effdf7; color: #047857; }
    .card-qty { background: #fff7ed; color: #c2410c; }

    .filters-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .filter-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .desktop-table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 1120px;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      font-size: 13px;
      color: #4b5563;
      background: #f8fafc;
      position: sticky;
      top: 0;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status-paid { background: #dcfce7; color: #166534; }
    .status-unpaid { background: #fee2e2; color: #991b1b; }

    .empty {
      text-align: center;
      padding: 28px 10px;
      color: var(--muted);
      font-size: 15px;
    }

    .mobile-records {
      display: none;
      gap: 14px;
    }

    .record-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .record-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .record-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .record-date {
      color: var(--muted);
      font-size: 13px;
    }

    .record-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      background: #f8fafc;
      border-radius: 14px;
      padding: 12px;
    }

    .metric-label {
      font-size: 12px;
      color: #6b7280;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .metric-value {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
      word-break: break-word;
    }

    .record-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .record-actions button {
      flex: 1;
    }

    .helper {
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
      line-height: 1.5;
    }

    @media (max-width: 1024px) {
      .form-grid,
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filters-row {
        grid-template-columns: 1fr 1fr;
      }

      .filter-actions {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 700px) {
      .container { padding: 14px; }
      .panel { padding: 16px; border-radius: 18px; }
      .page-title { font-size: 26px; }
      .form-grid,
      .summary-grid,
      .filters-row,
      .record-grid {
        grid-template-columns: 1fr;
